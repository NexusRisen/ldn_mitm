name: Release

on:
  push:
    tags:
    - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkita64:latest

    defaults:
      run:
        shell: bash

    steps:
    - name: Set env
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          echo "RELEASE_VERSION=${GITHUB_REF:10}" >> $GITHUB_ENV
        else
          echo "RELEASE_VERSION=nightly" >> $GITHUB_ENV
        fi

    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2

    - name: Build
      id: build
      run: |
        make -j$(nproc) PREFIX="ccache aarch64-none-elf-"
      continue-on-error: true

    - name: Install libnx master & Retry build
      id: retry
      if: ${{ steps.build.outcome == 'failure' }}
      run: |
        pushd /tmp
        git clone https://github.com/switchbrew/libnx
        cd libnx
        make -j$(nproc) PREFIX="ccache aarch64-none-elf-"
        make install
        popd
        make -j$(nproc) PREFIX="ccache aarch64-none-elf-"

    - name: Pack
      run: |
        cd ./out/sd
        zip -r ../../ldn_mitm_${{ env.RELEASE_VERSION }}.zip atmosphere switch

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ldn_mitm_${{ env.RELEASE_VERSION }}.zip
        name: ${{ env.RELEASE_VERSION }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact (on workflow_dispatch)
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: ldn_mitm_${{ env.RELEASE_VERSION }}
        path: ldn_mitm_${{ env.RELEASE_VERSION }}.zip
